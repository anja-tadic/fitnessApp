<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Train Club</ion-title>
    <ion-buttons slot="end">
      <ion-button class="logout-btn" (click)="logout()">
        Odjavi se
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="background-glow"></div>

  <div class="skener-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="50" height="50">
      <rect x="10" y="45" width="80" height="10" rx="5" fill="#8B5CF6"/>
      <rect x="10" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="75" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="2" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
      <rect x="88" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
    </svg>

    <h1 class="title">QR Skener</h1>
    <p class="subtitle">Skenirajte QR kod klijenta</p>

    <div id="qr-reader" class="qr-reader-box"></div>

    <ion-button *ngIf="!skeniranje" expand="block" class="skener-btn" (click)="startSkeniranje()">
      Pokreni skener
    </ion-button>

    <ion-button *ngIf="skeniranje" expand="block" fill="outline" class="stop-btn" (click)="stopSkeniranje()">
      Zaustavi skener
    </ion-button>

    <div class="poruka-box" *ngIf="poruka">
      <p [class.uspjeh]="!greska" [class.greska]="greska">{{ poruka }}</p>
    </div>

  </div>
</ion-content>

<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Train Club</ion-title>
    <ion-buttons slot="end">
      <ion-button class="logout-btn" (click)="logout()">
        Odjavi se
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="background-glow"></div>

  <div class="statistika-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="50" height="50">
      <rect x="10" y="45" width="80" height="10" rx="5" fill="#8B5CF6"/>
      <rect x="10" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="75" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="2" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
      <rect x="88" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
    </svg>

    <h1 class="title">Statistika dolazaka</h1>

    <div class="stats-row">
      <ion-card class="stat-card">
        <ion-card-content>
          <ion-icon name="person-outline"></ion-icon>
          <h2>{{ ukupno }}</h2>
          <p>Ukupno dolazaka</p>
        </ion-card-content>
      </ion-card>

      <ion-card class="stat-card">
        <ion-card-content>
          <ion-icon name="calendar-outline"></ion-icon>
          <h2>{{ danas }}</h2>
          <p>Danas</p>
        </ion-card-content>
      </ion-card>
    </div>

    <h2 class="lista-title">Istorija dolazaka</h2>

    <ion-card class="dolazak-card" *ngFor="let p of prisustva">
      <ion-card-content>
        <div class="dolazak-row">
          <ion-icon name="person-outline"></ion-icon>
          <div class="dolazak-info">
            <h3>{{ p.ime }}</h3>
            <p>{{ p.datumFormatiran }}</p>
          </div>
        </div>
      </ion-card-content>
    </ion-card>

    <p class="nema-podataka" *ngIf="prisustva.length === 0">
      Nema zabeleženih dolazaka.
    </p>

  </div>
</ion-content>

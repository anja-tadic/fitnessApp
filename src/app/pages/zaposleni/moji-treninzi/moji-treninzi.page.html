<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Moji treninzi</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="odjavi()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
   <ion-item *ngFor="let trening of treninzi" button detail (click)="otvoriDetalje(trening.id)">
      <ion-label>
        <h2>{{ trening.naziv }}</h2>
        <p>{{ trening.datum | date:'dd.MM.yyyy HH:mm' }}</p>
        <p>Prijavljeni: {{ trening.prijavljeni }}/{{ trening.kapacitet }}</p>
      </ion-label>
    </ion-item>

    <ion-item *ngIf="treninzi.length === 0">
      <ion-label class="ion-text-center">
        <p>Nemate zakazanih treninga.</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/treneri"></ion-back-button>
    </ion-buttons>
    <ion-title>Profil trenera</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="trener">
    <ion-item>
      <ion-label>
        <p>Ime i prezime</p>
        <h2>{{ trener.name }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Email</p>
        <h2>{{ trener.email }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Telefon</p>
        <h2>{{ trener.phone }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Pol</p>
        <h2>{{ trener.gender }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Uloga</p>
        <h2>{{ trener.role }}</h2>
      </ion-label>
    </ion-item>
  </div>
</ion-content>

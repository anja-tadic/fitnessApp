<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/klijent/treninzi"></ion-back-button>
    </ion-buttons>
    <ion-title>Train Club</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="qr-container">
    <div class="logo-icon">
      <ion-icon name="barbell"></ion-icon>
    </div>

    <h1 class="title">Vaš QR Kod</h1>
    <p class="subtitle">{{ korisnikIme }}</p>

    <div class="qr-wrapper">
      <img [src]="qrCodeUrl" alt="QR Kod" *ngIf="qrCodeUrl"/>
      <p *ngIf="!qrCodeUrl" class="loading-text">Učitavanje...</p>
    </div>

    <p class="info-text">Pokažite ovaj QR kod treneru prilikom dolaska na trening</p>
  </div>

</ion-content>

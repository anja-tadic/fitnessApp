<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Train Club</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="background-glow"></div>

  <div class="qr-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="50" height="50">
      <rect x="10" y="45" width="80" height="10" rx="5" fill="#8B5CF6"/>
      <rect x="10" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="75" y="35" width="15" height="30" rx="7" fill="#8B5CF6"/>
      <rect x="2" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
      <rect x="88" y="40" width="10" height="20" rx="5" fill="#8B5CF6"/>
    </svg>

    <h1 class="title">Vaš QR Kod</h1>
    <p class="subtitle">{{ korisnikIme }}</p>

    <div class="qr-wrapper">
      <img [src]="qrCodeUrl" alt="QR Kod" *ngIf="qrCodeUrl"/>
      <p *ngIf="!qrCodeUrl" class="loading-text">Učitavanje...</p>
    </div>

    <p class="info-text">Pokažite ovaj QR kod treneru prilikom dolaska na trening</p>
  </div>
</ion-content>
